{% extends "base.html" %}
{% block content %}

<h3>Expense History</h3>
<table class="table table-striped mt-3">
    <thead>
        <tr>
            <th>Date</th>
            <th>Title</th>
            <th>Category</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
        {% for exp in expenses %}
        <tr>
            <td>{{ exp[3] }}</td>
            <td>{{ exp[0] }}</td>
            <td>{{ exp[2] }}</td>
            <td>₹{{ exp[1] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="/dashboard" class="btn btn-primary mt-3">Back to Dashboard</a>

{% endblock %}
